<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
    <title>QNX0410 Extraction & Downloader</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Step 1: Extract Serial Numbers</h2>
        
        <button id="selectBtn">Select PDF Scan</button>
        <div id="filePathDisplay">No file selected</div>
        
        <button id="extractBtn" disabled>Run Extraction Engine</button>
        
        <div id="resultsArea"></div>
    </div>

    <script>
        let currentFilePath = null;
        
        const selectBtn = document.getElementById('selectBtn');
        const extractBtn = document.getElementById('extractBtn');
        const filePathDisplay = document.getElementById('filePathDisplay');
        const resultsArea = document.getElementById('resultsArea');

        // 1. Handle File Selection
        selectBtn.addEventListener('click', async () => {
            const filePath = await window.electronAPI.selectPdf();
            if (filePath) {
                currentFilePath = filePath;
                filePathDisplay.innerText = "Selected: " + filePath;
                extractBtn.disabled = false;
                resultsArea.style.display = 'none';
            }
        });

        // 2. Handle Extraction
        extractBtn.addEventListener('click', async () => {
            if (!currentFilePath) return;
            
            // Update UI to show loading state
            extractBtn.disabled = true;
            extractBtn.innerText = "Processing OCR (This may take a minute)...";
            resultsArea.style.display = 'block';
            resultsArea.innerHTML = "Initializing Tesseract Engine...";

            // Call Python through the bridge
            const response = await window.electronAPI.extractData(currentFilePath);
            
            // Reset button
            extractBtn.disabled = false;
            extractBtn.innerText = "Run Extraction Engine";

            // Display Results
            if (response.success) {
                // Build the CSS Grid HTML dynamically
                let gridHtml = '<div class="serial-grid">';
                response.serial_numbers.forEach(sn => {
                    gridHtml += `<div class="serial-item">${sn}</div>`;
                });
                gridHtml += '</div>';

                resultsArea.innerHTML = `<strong style="color: #059669;">Success! Found ${response.count} serial numbers:</strong>` + gridHtml;
            } else {
                resultsArea.innerHTML = `<strong style="color: red;">Error:</strong><br>${response.error}`;
            }
        });
    </script>
</body>
</html>
