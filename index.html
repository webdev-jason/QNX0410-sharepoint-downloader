<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
    <title>QNX0410 Extraction & Downloader</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="main-layout">
            
            <div class="column">
                <h2>Step 1: Extract Serial Numbers</h2>
                <button id="selectBtn">Select PDF Scan</button>
                <div id="filePathDisplay">No file selected</div>
                <button id="extractBtn" disabled>Extract Serial Numbers</button>
                
                <div id="resultsArea"></div>
            </div>

            <div class="vertical-divider"></div>

            <div class="column">
                <div id="step2Container" style="display: none; height: 100%;">
                    <h2>Step 2: Download QC Reports</h2>
                    
                    <button id="downloadBtn" style="background-color: #059669;">Download Matching Reports</button>
                    <div id="downloadResults" style="margin-top: 15px; text-align: center;"></div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // State variables
        let currentFilePath = null;
        let finalDestinationFolder = null;
        
        // Elements
        const selectBtn = document.getElementById('selectBtn');
        const extractBtn = document.getElementById('extractBtn');
        const filePathDisplay = document.getElementById('filePathDisplay');
        const resultsArea = document.getElementById('resultsArea');
        const step2Container = document.getElementById('step2Container');
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadResults = document.getElementById('downloadResults');

        // --- STEP 1 LOGIC ---
        selectBtn.addEventListener('click', async () => {
            const filePath = await window.electronAPI.selectPdf();
            if (filePath) {
                currentFilePath = filePath;
                filePathDisplay.innerText = "Selected: " + filePath;
                extractBtn.disabled = false;
                resultsArea.style.display = 'none';
                step2Container.style.display = 'none';
            }
        });

        extractBtn.addEventListener('click', async () => {
            if (!currentFilePath) return;
            
            extractBtn.disabled = true;
            extractBtn.innerText = "Processing OCR (This may take a minute)...";
            resultsArea.style.display = 'block';
            
            // CHANGED: Removed technical jargon from the loading state
            resultsArea.innerHTML = "Reading document, please wait...";

            const response = await window.electronAPI.extractData(currentFilePath);
            
            extractBtn.disabled = false;
            extractBtn.innerText = "Extract Serial Numbers";

            if (response.success) {
                let gridHtml = '<div class="serial-grid">';
                response.serial_numbers.forEach(sn => {
                    gridHtml += `<input type="text" class="serial-item" value="${sn}">`;
                });
                gridHtml += '</div>';

                // CHANGED: Trimmed down the warning message to be more direct
                resultsArea.innerHTML = `
                    <div style="margin-bottom: 15px;">
                        <div class="success-text" style="margin-bottom: 10px; font-size: 16px;">Success! Found ${response.count} serial numbers:</div>
                        <div style="background-color: #fffbeb; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 4px; font-size: 13px; color: #92400e; display: flex; align-items: flex-start; gap: 10px;">
                            <span style="font-size: 16px;">⚠️</span>
                            <div>
                                <strong>ACTION REQUIRED:</strong> You must visually verify these numbers against the physical document. Click any box to correct errors before downloading.
                            </div>
                        </div>
                    </div>` + gridHtml;
                
                step2Container.style.display = 'block';
                downloadResults.innerHTML = "";
            } else {
                resultsArea.innerHTML = `<span class="error-text">Error:</span><br>${response.error}`;
            }
        });

        // --- STEP 2 LOGIC ---
        downloadBtn.addEventListener('click', async () => {
            const inputElements = document.querySelectorAll('.serial-item');
            const finalSerialNumbers = Array.from(inputElements)
                .map(input => input.value.trim())
                .filter(val => val !== "");

            if (finalSerialNumbers.length === 0) return;

            downloadBtn.disabled = true;
            downloadBtn.innerText = "Scanning SharePoint & Copying Files...";
            downloadResults.innerHTML = "";

            const response = await window.electronAPI.downloadReports(finalSerialNumbers);

            downloadBtn.disabled = false;
            downloadBtn.innerText = "Download Matching Reports";

            if (response.success) {
                finalDestinationFolder = response.destFolder;
                
                let html = `<p class="success-text">Download Complete!</p>
                            <p>Files Successfully Copied: <b>${response.foundCount}</b></p>
                            <p>Missing / Not Found: <b>${response.missingCount}</b></p>`;

                if (response.missingCount > 0) {
                    html += `<div class="missing-box">
                                <strong>Missing Serial Numbers:</strong><br>
                                ${response.missingSerials.join('<br>')}
                             </div>`;
                }

                html += `
                    <div style="margin-top: 25px; font-size: 13px; color: #4b5563; word-break: break-all;">
                        Saved to:<br><b>${response.destFolder}</b>
                    </div>
                    <button id="openFolderBtn" style="margin-top: 10px; background-color: #4b5563;">Open Results Folder</button>`;
                
                downloadResults.innerHTML = html;

                document.getElementById('openFolderBtn').addEventListener('click', () => {
                    window.electronAPI.openFolder(finalDestinationFolder);
                });

            } else {
                downloadResults.innerHTML = `<span class="error-text">Error connecting to SharePoint:</span><br>${response.error}`;
            }
        });
    </script>
</body>
</html>
